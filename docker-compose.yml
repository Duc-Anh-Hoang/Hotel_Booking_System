services:
#backend
  backend:
    build: ./backend
    container_name: hotel_backend
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway" 
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://host.docker.internal:1433;databaseName=hotel_db;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=MatKhauCuaBan  #FRONTEND 
  frontend:
    build: ./frontend
    container_name: hotel_frontend
    ports:
      - "80:80"
    depends_on:
      - backend