# ============================================================
#  HBMS - application-docker.yml
#  Đặt tại: backend/src/main/resources/application-docker.yml
#  Kích hoạt bởi: SPRING_PROFILES_ACTIVE=docker (trong docker-compose.yml)
#
#  File này OVERRIDE application.yml khi chạy trong Docker.
#  Các biến ${...} được inject từ environment trong docker-compose.yml.
# ============================================================

spring:
  # ── Datasource ─────────────────────────────────────────────
  datasource:
    # "sqlserver" = tên service trong docker-compose.yml
    # Docker DNS nội bộ tự resolve → IP container SQL Server
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      pool-name: HBMS-Pool
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000
      connection-test-query: SELECT 1  # Phát hiện connection chết

  # ── JPA / Hibernate ────────────────────────────────────────
  jpa:
    hibernate:
      # "validate": Chỉ kiểm tra schema khớp với Entity, KHÔNG tự tạo bảng
      # Bảng đã được tạo bởi HotelBookingDB.sql (qua init-db.sh)
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # ── Flyway (quản lý V1__init_auth_schema.sql, V2__create_room_tables.sql) ──
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    # baseline-on-migrate: true vì DB đã có sẵn schema từ HotelBookingDB.sql
    # Flyway sẽ đánh dấu baseline thay vì báo lỗi "schema đã tồn tại"
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: 0
    validate-on-migrate: true

  # ── Mail (MailService trong module invoice/) ────────────────
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── Multipart Upload (PdfService, ảnh phòng) ───────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# ── Server ───────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /api/v1    # Tất cả API có prefix /api/v1

# ── Actuator (healthcheck cho Docker) ────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never    # Không lộ thông tin nhạy cảm ra ngoài

# ── JWT (JwtConfig trong common/config/) ─────────────────────
app:
  jwt:
    secret-key: ${APP_JWT_SECRET_KEY}
    access-expiration-ms: ${APP_JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${APP_JWT_REFRESH_EXPIRATION_MS:604800000}

  # ── CORS: Cho phép Frontend gọi Backend ────────────────────
  cors:
    allowed-origins:
      - "http://localhost"       # Frontend container (qua Nginx)
      - "http://localhost:3000"  # Khi dev frontend local (npm run dev)
      - "http://localhost:5173"  # Vite dev server default port

  # ── Payment (PaymentController) ────────────────────────────
  payment:
    vnpay:
      tmn-code: ${APP_PAYMENT_VNPAY_TMN_CODE}
      hash-secret: ${APP_PAYMENT_VNPAY_HASH_SECRET}
      pay-url: "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html"
      return-url: "http://localhost/payments/vnpay/callback"
    momo:
      partner-code: ${APP_PAYMENT_MOMO_PARTNER_CODE}
      access-key: ${APP_PAYMENT_MOMO_ACCESS_KEY}
      secret-key: ${APP_PAYMENT_MOMO_SECRET_KEY}
      endpoint: "https://test-payment.momo.vn/v2/gateway/api/create"
      return-url: "http://localhost/payments/momo/callback"

  # ── OpenAI Chatbot (OpenAIService trong chatbot/) ──────────
  openai:
    api-key: ${APP_OPENAI_API_KEY}
    model: "gpt-4o-mini"
    max-tokens: 500

# ── Logging ──────────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.hotel: INFO                          # Package chính của project
    org.springframework.security: WARN
    org.flywaydb: INFO                       # Xem Flyway chạy migration nào
  file:
    name: /app/logs/hbms-backend.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
